<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${param.lang ?: 'es'}">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Lugar</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

    <header>
        <h1>📍 Nuevo lugar de interés</h1>
    </header>

    <main>
        <div class="table-container" style="padding:30px; max-width:600px; margin:auto;">
            <form th:action="@{/web/lugares/nuevo}" method="POST">

                <div class="form-group">
                    <label>Nombre del lugar:</label>
                    <input type="text" name="nombre" required minlength="2">
                </div>

                <div class="form-group">
                    <label>Descripción:</label>
                    <textarea name="descripcion" rows="3" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:5px;"></textarea>
                </div>

                <div class="form-group">
                    <label>Tipo de actividad:</label>
                    <select name="tipo" required>
                        <option value="">-- Seleccionar --</option>
                        <option value="cultura">Cultura</option>
                        <option value="naturaleza">Naturaleza</option>
                        <option value="gastronomia">Gastronomía</option>
                        <option value="ocio">Ocio</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Precio de entrada (€):</label>
                    <input type="number" name="precio" min="0" step="0.01" value="0">
                </div>

                <div class="form-group">
                    <label>Duración estimada (horas):</label>
                    <input type="number" name="duracionVisita" min="0.5" step="0.5" value="1.0" required>
                </div>

                <div class="form-group">
                    <label>Destino:</label>
                    <select name="destinoId" required>
                        <option value="">-- Seleccionar destino --</option>
                        <option th:each="d : ${destinos}" th:value="${d.id.value}" th:text="${d.nombre + ' (' + d.pais + ')'}"></option>
                    </select>
                </div>

                <div class="actions" style="margin-top:20px;">
                    <button type="submit" class="action-card">💾 Guardar</button>
                    <a th:href="@{/web/lugares/lista}" class="action-card" style="background-color:#f0f0f0; color:#1e293b;">↩ Volver</a>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
