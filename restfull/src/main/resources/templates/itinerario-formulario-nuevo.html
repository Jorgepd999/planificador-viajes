<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${param.lang ?: 'es'}">
<head>
    <meta charset="UTF-8">
    <title>Planificar viaje</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

    <header>
        <h1>🗺 Planificar nuevo viaje</h1>
    </header>

    <main>
        <div class="table-container" style="padding:30px; max-width:650px; margin:auto;">
            <form th:action="@{/web/itinerarios/nuevo}" method="POST">

                <div class="form-group">
                    <label>Nombre del viaje:</label>
                    <input type="text" name="nombre" placeholder="Ej: Vacaciones en Barcelona" required minlength="3">
                </div>

                <div class="form-group">
                    <label>Destino:</label>
                    <select name="destinoId" required>
                        <option value="">-- Seleccionar destino --</option>
                        <option th:each="d : ${destinos}" th:value="${d.id.value}"
                                th:text="${d.nombre + ' (' + d.pais + ')'}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Duración (días):</label>
                    <input type="number" name="duracion" min="1" max="30" value="3" required>
                </div>

                <div class="form-group">
                    <label>Presupuesto total (€):</label>
                    <input type="number" name="presupuesto" min="0" step="10" value="200" required>
                </div>

                <div class="form-group">
                    <label>Preferencias (selecciona una o varias):</label>
                    <div style="display:flex; gap:15px; flex-wrap:wrap; margin-top:8px;">
                        <label class="checkbox-label">
                            <input type="checkbox" name="preferencias" value="cultura"> 🏛 Cultura
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="preferencias" value="naturaleza"> 🌿 Naturaleza
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="preferencias" value="gastronomia"> 🍽 Gastronomía
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="preferencias" value="ocio"> 🎭 Ocio
                        </label>
                    </div>
                </div>

                <div class="actions" style="margin-top:20px;">
                    <button type="submit" class="action-card">✨ Generar itinerario</button>
                    <a th:href="@{/web/menu}" class="action-card" style="background-color:#f0f0f0; color:#1e293b;">↩ Volver</a>
                </div>
            </form>
        </div>
    </main>

    <script>
        // Combina checkboxes en un solo campo "preferencias" como CSV
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const checked = Array.from(document.querySelectorAll('input[name="preferencias"]:checked'))
                .map(cb => cb.value);
            const hidden = document.createElement('input');
            hidden.type = 'hidden';
            hidden.name = 'preferencias';
            hidden.value = checked.join(',');
            // Deshabilitar los checkboxes para no duplicar el parámetro
            document.querySelectorAll('input[name="preferencias"]').forEach(cb => cb.disabled = true);
            this.appendChild(hidden);
            this.submit();
        });
    </script>

</body>
</html>
