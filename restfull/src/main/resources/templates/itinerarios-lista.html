<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${param.lang ?: 'es'}">
<head>
    <meta charset="UTF-8">
    <title>Mis Itinerarios</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

    <header>
        <h1>📋 Mis itinerarios</h1>
        <div class="language-selector">
            <a th:href="@{/web/itinerarios/lista(lang='es')}">🇪🇸</a>
            <a th:href="@{/web/itinerarios/lista(lang='en')}">🇬🇧</a>
        </div>
    </header>

    <main>
        <div class="actions">
            <a th:href="@{/web/itinerarios/nuevo}" class="action-card">🗺 Planificar viaje</a>
            <a th:href="@{/web/menu}" class="action-card">🏠 Menú principal</a>
        </div>

        <div th:if="${itinerarios.empty}" style="text-align:center; padding:40px; color:#64748b;">
            <p>No tienes itinerarios todavía. ¡Empieza planificando tu próximo viaje!</p>
        </div>

        <table th:unless="${itinerarios.empty}">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Destino</th>
                    <th>Duración</th>
                    <th>Presupuesto</th>
                    <th>Preferencias</th>
                    <th>Favorito</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="it : ${itinerarios}">
                    <td th:text="${it.nombre}"></td>
                    <td th:text="${it.nombreDestino ?: it.destinoId}"></td>
                    <td th:text="${it.duracion + ' días'}"></td>
                    <td th:text="${it.presupuesto + ' €'}"></td>
                    <td th:text="${it.preferencias}"></td>
                    <td>
                        <form th:action="@{/web/itinerarios/favorito/{id}(id=${it.id.value})}" method="post" style="display:inline">
                            <button type="submit" class="btn" th:text="${it.favorito ? '⭐' : '☆'}"
                                    th:title="${it.favorito ? 'Quitar de favoritos' : 'Añadir a favoritos'}"></button>
                        </form>
                    </td>
                    <td>
                        <a th:href="@{/web/itinerarios/ver/{id}(id=${it.id.value})}" class="btn btn-edit" title="Ver detalle">👁</a>
                        <form th:action="@{/web/itinerarios/borrar/{id}(id=${it.id.value})}" method="post" style="display:inline">
                            <button type="submit" class="btn btn-delete" onclick="return confirm('¿Eliminar este itinerario?')">🗑</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

</body>
</html>
